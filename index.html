<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rabbit Runner Easy</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #f7f7f7;
    touch-action: none; /* スクロール防止 */
  }

  #game {
    width: 100%;
    height: 30vh; /* 画面の30％に調整 */
    position: relative;
    border-bottom: 2px solid #333;
    background: white;
  }

  #rabbit {
    position: absolute;
    bottom: 0;
    left: 5%;
    width: 40px;
    height: 40px;
  }

  .run {
    animation: run 0.3s infinite alternate;
  }

  @keyframes run {
    from { transform: translateY(0); }
    to { transform: translateY(-2px); }
  }

  .jump {
    animation: jump 0.65s ease;
  }

  @keyframes jump {
    0% { bottom: 0; }
    50% { bottom: 110px; }
    100% { bottom: 0; }
  }

  .obstacle {
    position: absolute;
    bottom: 0;
    width: 18px;
    height: 35px;
    background: #2d7a2d;
  }

  .bird {
    position: absolute;
    width: 28px;
    height: 18px;
    background: #333;
  }

  #score {
    position: absolute;
    right: 10px;
    top: 5px;
    font-size: 2.5em;
  }

  #gameOver {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 40%;
    display: none;
    font-size: 2.5em;
  }

  #message {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 10px;
    font-size: 5.0em;
    opacity: 0;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>

<div id="game">
  <div id="rabbit" class="run">
    <svg viewBox="0 0 16 16">
      <rect x="4" y="7" width="8" height="5" fill="black"/>
      <rect x="5" y="3" width="2" height="4" fill="black"/>
      <rect x="9" y="3" width="2" height="4" fill="black"/>
      <rect x="10" y="8" width="1" height="1" fill="white"/>
      <rect x="5" y="12" width="2" height="2" fill="black"/>
      <rect x="9" y="12" width="2" height="2" fill="black"/>
    </svg>
  </div>

  <div id="score">0</div>
  <div id="message"></div>
  <div id="gameOver">GAME OVER<br>画面をタップで再開</div>
</div>

<script>
const rabbit = document.getElementById("rabbit");
const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const gameOverEl = document.getElementById("gameOver");
const messageEl = document.getElementById("message");

let jumping = false;
let gameOver = false;
let score = 0;
let speed = 5;

// メッセージ管理
let shown100 = false;
let shown200 = false;
let shown300 = false;

function showMessage(text) {
  messageEl.textContent = text;
  messageEl.style.opacity = 1;
  setTimeout(() => { messageEl.style.opacity = 0; }, 1500);
}

function jump() {
  if (jumping || gameOver) return;
  jumping = true;
  rabbit.classList.remove("run");
  rabbit.classList.add("jump");
  setTimeout(() => {
    rabbit.classList.remove("jump");
    rabbit.classList.add("run");
    jumping = false;
  }, 650);
}

// キーボード操作
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    if (gameOver) restart();
    else jump();
  }
});

// タップ操作（スマホ対応）
game.addEventListener("touchstart", (e) => {
  e.preventDefault();
  if (gameOver) restart();
  else jump();
});

function createObstacle() {
  if (gameOver) return;
  const obstacle = document.createElement("div");
  obstacle.classList.add("obstacle");
  obstacle.style.right = "-20px";
  obstacle.style.width = (18 * window.innerWidth / 800) + "px";
  obstacle.style.height = (35 * window.innerWidth / 800) + "px";
  game.appendChild(obstacle);
  move(obstacle);
}

function createBird() {
  if (gameOver || score < 400) return;
  const bird = document.createElement("div");
  bird.classList.add("bird");
  bird.style.right = "-30px";
  bird.style.width = (28 * window.innerWidth / 800) + "px";
  bird.style.height = (18 * window.innerWidth / 800) + "px";
  bird.style.top = (70 + Math.random()*30) + "px";
  game.appendChild(bird);
  move(bird);
}

function move(el) {
  let pos = -20;
  const interval = setInterval(() => {
    if (gameOver) {
      clearInterval(interval);
      return;
    }
    pos += speed;
    el.style.right = pos + "px";

    if (pos > window.innerWidth + 50) {
      el.remove();
      clearInterval(interval);
    }
    checkCollision(el);
  }, 20);
}

function checkCollision(el) {
  const r1 = rabbit.getBoundingClientRect();
  const r2 = el.getBoundingClientRect();
  const padding = 10;

  if (r1.left + padding < r2.right &&
      r1.right - padding > r2.left &&
      r1.top + padding < r2.bottom &&
      r1.bottom - padding > r2.top) {
    endGame();
  }
}

function endGame() {
  gameOver = true;
  gameOverEl.style.display = "block";
}

function restart() {
  document.querySelectorAll(".obstacle, .bird").forEach(e => e.remove());
  gameOver = false;
  score = 0;
  speed = 5;
  gameOverEl.style.display = "none";
  shown100 = false;
  shown200 = false;
  shown300 = false;
}

setInterval(() => {
  if (!gameOver) {
    score++;
    scoreEl.textContent = score;

    if (score > 100 && !shown100) { showMessage("Good"); shown100 = true; }
    if (score > 200 && !shown200) { showMessage("Excellent"); shown200 = true; }
    if (score > 300 && !shown300) { showMessage("Happy Birthday Mochi-san"); shown300 = true; }

    if (score % 150 === 0) speed += 0.5;
  }
}, 100);

setInterval(createObstacle, 1800);
setInterval(createBird, 3000);
</script>

</body>
</html>
